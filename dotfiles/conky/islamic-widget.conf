conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'FFFFFF',
    default_outline_color = 'white',
    default_shade_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = false,
    use_xft = true,
    font = 'DejaVu Sans:size=10',
    gap_x = 30,
    gap_y = 60,
    minimum_height = 5,
    minimum_width = 280,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 230,
    own_window_colour = '1E2127',
    stippled_borders = 0,
    update_interval = 60.0,
    uppercase = false,
    use_spacer = 'none',
    show_graph_scale = false,
    show_graph_range = false,
    
    -- Colors from OneDark theme
    color0 = '61AFEF',  -- primary (blue)
    color1 = '98C379',  -- active (green)
    color2 = 'E06C75',  -- urgent (red)
    color3 = 'FFFFFF',  -- foreground (white)
}

conky.text = [[
${alignc}${color0}${font DejaVu Sans:size=32}${time %H:%M}${font}
${alignc}${color3}${font DejaVu Sans:size=12}${time %A, %B %d, %Y}${font}
${color0}${hr 2}

${color0}${font DejaVu Sans:bold:size=11}PRAYER TIMES${font}
${color3}${execpi 3600 ~/.config/conky/format-prayer-times.sh}
]]
